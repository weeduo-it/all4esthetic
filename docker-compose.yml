services:
  web:
    image: ghcr.io/weeduo-it/all4esthetic:latest
    networks:
      - shared-network
    deploy:
      labels:
        - "traefik.enable=true"

        # serve the bare domain normally
        - "traefik.http.routers.all4esthetic.rule=Host(`all4esthetic.com`)"
        - "traefik.http.routers.all4esthetic.entrypoints=websecure"
        - "traefik.http.routers.all4esthetic.tls.certresolver=myresolver"
        - "traefik.http.services.all4esthetic.loadbalancer.server.port=3000"

        # extra router for www that simply redirects to the non-www site
        - "traefik.http.routers.all4esthetic-www.rule=Host(`www.all4esthetic.com`)"
        - "traefik.http.routers.all4esthetic-www.entrypoints=websecure"
        - "traefik.http.routers.all4esthetic-www.tls.certresolver=myresolver"
        - "traefik.http.routers.all4esthetic-www.middlewares=redirect-to-root@docker"
        - "traefik.http.middlewares.redirect-to-root.redirectregex.regex=^https?://www\\.(.*)"
        - "traefik.http.middlewares.redirect-to-root.redirectregex.replacement=https://$$1"

  traefik_redirect:
    image: traefik/whoami
    networks:
      - shared-network
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.http-catchall.rule=HostRegexp(`{host:.+}`)"
        - "traefik.http.routers.http-catchall.entrypoints=web"
        - "traefik.http.routers.http-catchall.middlewares=redirect-to-https"
        - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
        - "traefik.http.services.traefik_redirect.loadbalancer.server.port=80" 

networks:
  shared-network:
    external: true
    